<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lupe Holsman</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-404 {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background-color: white;
            position: relative;
            overflow: hidden;
        }

        .error-code {
            font-size: clamp(7rem, 20vw, 14rem);
            font-weight: 800;
            line-height: 1;
            color: #f0f0f0;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -55%);
            z-index: 0;
            user-select: none;
            white-space: nowrap;
        }

        .error-content {
            position: relative;
            z-index: 1;
            max-width: 520px;
            animation: fadeInUp 0.8s ease-out both;
        }

        .error-tag {
            display: inline-block;
            background: var(--primary);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.8s ease-out 0.1s both;
        }

        .error-title {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 800;
            line-height: 1.1;
            color: var(--dark);
            margin-bottom: 1rem;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .error-title span {
            color: var(--primary);
        }

        .error-subtitle {
            font-size: 1rem;
            color: #666;
            line-height: 1.7;
            margin-bottom: 2.5rem;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .btn-outline {
            padding: 0.75rem 1.4rem;
            border-radius: 2rem;
            font-size: 0.95rem;
            font-weight: 600;
            display: inline-block;
            border: 2px solid var(--dark);
            color: var(--dark);
            transition: all 0.3s ease;
        }

        .btn-outline:hover {
            background: var(--dark);
            color: white;
            transform: translateY(-2px);
        }

        .error-character {
            position: absolute;
            bottom: 0;
            right: 5%;
            width: clamp(160px, 22vw, 300px);
            opacity: 0;
            transform: translateX(60px);
            animation: slideInChar 0.9s ease-out 0.5s forwards;
            pointer-events: none;
        }

        .glitch {
            position: relative;
            display: inline-block;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            color: var(--cyan);
            animation: glitch1 3s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }

        .glitch::after {
            color: var(--primary);
            animation: glitch2 3s infinite;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        }

        @keyframes glitch1 {
            0%, 90%, 100% { transform: translate(0); }
            92%            { transform: translate(-4px, 1px); }
            94%            { transform: translate(4px, -1px); }
            96%            { transform: translate(-2px, 2px); }
        }

        @keyframes glitch2 {
            0%, 90%, 100% { transform: translate(0); }
            92%            { transform: translate(4px, -1px); }
            94%            { transform: translate(-4px, 1px); }
            96%            { transform: translate(2px, -2px); }
        }

        @keyframes slideInChar {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Dots decorativos */
        .dot {
            position: absolute;
            border-radius: 50%;
            background: var(--primary);
            opacity: 0.08;
            z-index: 0;
        }

        .dot-1 { width: 300px; height: 300px; top: -80px; left: -80px; }
        .dot-2 { width: 180px; height: 180px; bottom: 10%; left: 10%; background: var(--cyan); }
    </style>
</head>

<body>

    <header>
        <div class="container">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="404.html">About</a></li>
                    <li><a href="404.html">My Work</a></li>
                </ul>
                <a href="index.html#contact" class="btn">Contact</a>
            </nav>
        </div>
    </header>

    <main class="page-404">

        <!-- Fondo decorativo -->
        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>
        <div class="error-code">404</div>

        <div class="error-content">
            <span class="error-tag">Error 404</span>

            <h1 class="error-title">
                This page is still <br>
                <span class="glitch" data-text="in progress.">in progress.</span>
            </h1>

            <p class="error-subtitle">
                You found the one thing Lupe hasn't designed yet.<br>
                Portfolio coming soon — the best work takes time.
            </p>

            <div class="error-actions">
                <a href="index.html" class="btn">Back to home</a>
                <a href="index.html#contact" class="btn-outline">Get in touch</a>
            </div>
        </div>

        <!-- Personaje en la esquina -->
        <img
            src="img/IMG_2661 1.png"
            alt="Lupe character"
            class="error-character"
        >

    </main>

</body>
</html>
